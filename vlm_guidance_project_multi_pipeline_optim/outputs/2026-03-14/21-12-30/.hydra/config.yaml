diffusion:
  _target_: vlm_guidance.diffusion.sd15.StableDiffusion15Backend
  model_id: runwayml/stable-diffusion-v1-5
  device: cuda:0
  weights_dtype: float16
  autocast_enabled: false
  autocast_dtype: bfloat16
scorer:
  _target_: vlm_guidance.scorers.clip_flant5.CLIPFlanT5DifferentiableScorer
  model_name: clip-flant5-xxl
  device: cuda:0
  autocast_enabled: false
  autocast_dtype: bfloat16
  question_template: Does this figure show "{}"? Please answer yes or no.
  answer_template: 'Yes'
algorithm:
  _target_: vlm_guidance.guidance.vqa_gradient.VQAGuidanceConfig
  gd_steps: 2
  gd_lr: 0.5
  gd_only_first_k_steps: 5
  normalize_grad: true
  clamp_grad_value: 1.0
  save_only_final_img: true
  final_img_filename: img.png
  save_debug_tensors: false
vanilla_sd:
  _target_: vlm_guidance.generation.vanilla_sd15.VanillaSD15Pipeline
  model_id: runwayml/stable-diffusion-v1-5
  device: cuda:0
  torch_dtype: float16
  enable_attention_slicing: false
  enable_xformers_memory_efficient_attention: false
flux1:
  _target_: vlm_guidance.generation.flux1_dev.Flux1DevPipeline
  model_id: black-forest-labs/FLUX.1-dev
  device: cuda:0
  torch_dtype: bfloat16
  enable_model_cpu_offload: true
  max_sequence_length: 512
logging:
  hydra:
    run:
      dir: outputs/${now:%Y-%m-%d}/${now:%H-%M-%S}
    sweep:
      dir: multirun/${now:%Y-%m-%d}/${now:%H-%M-%S}
      subdir: ${hydra.job.num}
    job:
      chdir: true
    job_logging:
      version: 1
      formatters:
        simple:
          format: '[%(asctime)s][%(name)s][%(levelname)s] - %(message)s'
      handlers:
        console:
          class: logging.StreamHandler
          formatter: simple
          stream: ext://sys.stdout
        file:
          class: logging.FileHandler
          formatter: simple
          filename: ${hydra.runtime.output_dir}/run.log
      root:
        level: INFO
        handlers:
        - console
        - file
      disable_existing_loggers: false
run:
  _target_: vlm_guidance.guidance.vqa_gradient.RunConfig
  negative_prompt: blurry, low quality
  height: 512
  width: 512
  num_inference_steps: 30
  guidance_scale: 7.5
  seed: 42
  batch_size: 1
  vqa_score: true
  vanilla_sd: false
  flux1: false
batch:
  prompts_file: ../datasets/complex_cases.txt
  output_root_dir: complex_cases_lr05_k5_generations
  skip_empty_lines: true
